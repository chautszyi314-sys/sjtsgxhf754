        <h2 style="color: #333; margin-top: 15px; font-weight: normal;">图片上传与预览系统</h2>
    </div>

    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; width: 90%; max-width: 500px;">
        
        <input type="file" id="imageInput" accept="image/*" style="font-size: 16px; margin-bottom: 20px; cursor: pointer;">
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

        <div style="margin-top: 15px;">
            <p style="color: #888; font-size: 14px; margin-bottom: 10px;">上传的图片将在下方显示：</p>
            <img id="previewImage" src="" style="max-width: 100%; max-height: 400px; border-radius: 6px; display: none; box-shadow: 0 2px 6px rgba(0,0,0,0.1);">
        </div>

    </div>

    <script>
        // 监听文件选择框的变化
        document.getElementById('imageInput').addEventListener('change', function(event) {
            var file = event.target.files[0]; // 获取用户选择的文件
            
            if (file) {
                var reader = new FileReader(); // 实例化HTML5本地读取对象
                
                reader.onload = function(e) {
                    var imgElement = document.getElementById('previewImage');
                    imgElement.src = e.target.result; // 将读取出来的图片base64路径赋值给img
                    imgElement.style.display = 'inline-block'; // 将图片设置为可见
                };
                
                reader.readAsDataURL(file); // 开始读取文件
            }
        });
    </script>
