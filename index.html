<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>图片全屏展示系统</title>
    
    <link rel="icon" href="IMG_6909.jpeg" type="image/jpeg">
    <link rel="apple-touch-icon" href="IMG_6909.jpeg">

    <style>
        /* 移动端基础重置 */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 移除手机上点击时的蓝色高亮框 */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 主页面卡片容器 */
        .main-container {
            text-align: center;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 85%;
            max-width: 360px;
        }

        /* 原生文件上传框隐藏 */
        #file-input {
            display: none;
        }

        /* 网页中央的上传图标（使用你提供的图片） */
        .site-logo {
            width: 110px;
            height: 110px;
            border-radius: 24px; /* 完美匹配图标的圆角 */
            box-shadow: 0 8px 20px rgba(0, 118, 255, 0.25);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        /* 手机端手指按下时的微缩反馈效果 */
        .site-logo:active {
            transform: scale(0.95);
        }

        .upload-hint {
            margin-top: 18px;
            font-size: 16px;
            color: #333333;
            font-weight: 500;
        }

        .upload-sub-hint {
            margin-top: 6px;
            font-size: 13px;
            color: #94a3b8;
        }

        /* =========================================
           手机端完美全屏遮罩层（兼容 iOS 和 Android）
           ========================================= */
        #fullscreen-overlay {
            display: none; /* 默认隐藏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            z-index: 99999; /* 保证在最顶层 */
            justify-content: center;
            align-items: center;
        }

        #fullscreen-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 确保图片在手机屏幕上完整显示，不被裁剪 */
        }
    </style>
</head>
<body>

    <div class="main-container">
        <input type="file" id="file-input" accept="image/*">
        
        <label for="file-input" style="cursor: pointer; display: inline-block;">
            <img src="IMG_6909.jpeg" alt="网站标识" class="site-logo">
            <div class="upload-hint">点击图标上传图片</div>
            <div class="upload-sub-hint">支持从相册选择或直接拍照</div>
        </label>
    </div>

    <div id="fullscreen-overlay">
        <img id="fullscreen-img" src="" alt="全屏预览">
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const fullscreenOverlay = document.getElementById('fullscreen-overlay');
        const fullscreenImg = document.getElementById('fullscreen-img');

        // 1. 监听用户上传/拍摄行为
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    // 将上传的图片放入全屏容器中
                    fullscreenImg.src = event.target.result;
                    // 显示全屏黑色遮罩
                    fullscreenOverlay.style.style.display = 'flex';
                    
                    // 动用浏览器原生全屏API（针对Android端可隐藏状态栏，iOS端则通过上面的fixed布局完美适配）
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(() => {});
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        // 2. 在全屏状态下，用手指轻触屏幕任意地方，即可退出全屏
        fullscreenOverlay.addEventListener('click', function() {
            fullscreenOverlay.style.display = 'none'; // 隐藏全屏层
            fileInput.value = ''; // 清空输入框，方便下次连续上传同一张图
            
            // 退出原生全屏状态
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(() => {});
            }
        });
    </script>

</body>
</html>
